# PostgreSQL Streaming Replication Configuration
# HIPAA §164.308(a)(7) — Contingency Plan
#
# Primary server configuration for disaster recovery
# RPO target: < 1 hour | RTO target: < 4 hours

# ============================================================
# WAL (Write-Ahead Log) Configuration
# ============================================================
# Required for streaming replication and point-in-time recovery
wal_level = replica
max_wal_senders = 10
wal_keep_size = 1024MB

# WAL archiving for continuous backup
archive_mode = on
archive_command = 'aws s3 cp %p s3://${BACKUP_S3_BUCKET_PRIMARY}/wal-archive/%f --sse AES256'
archive_timeout = 300

# ============================================================
# Replication Configuration
# ============================================================
# Synchronous replication for zero data loss (RPO = 0 for committed transactions)
synchronous_commit = on
synchronous_standby_names = 'medsecure_standby'

# Replication slots to prevent WAL removal before standby catches up
max_replication_slots = 10

# ============================================================
# Standby Configuration (apply on standby server)
# ============================================================
# hot_standby = on
# primary_conninfo = 'host=${DB_PRIMARY_HOST} port=5432 user=replication password=${DB_REPLICATION_PASSWORD} sslmode=require'
# primary_slot_name = 'medsecure_standby_slot'
# hot_standby_feedback = on
# recovery_target_timeline = 'latest'

# ============================================================
# Connection & Performance
# ============================================================
max_connections = 200
shared_buffers = 4GB
effective_cache_size = 12GB
work_mem = 64MB
maintenance_work_mem = 1GB

# ============================================================
# SSL/TLS Configuration (HIPAA requirement for PHI in transit)
# ============================================================
ssl = on
ssl_cert_file = '/etc/ssl/certs/medsecure-db.crt'
ssl_key_file = '/etc/ssl/private/medsecure-db.key'
ssl_ca_file = '/etc/ssl/certs/ca-bundle.crt'
ssl_min_protocol_version = 'TLSv1.2'

# ============================================================
# Logging for HIPAA Audit Trail
# ============================================================
log_replication_commands = on
log_connections = on
log_disconnections = on
log_statement = 'ddl'
log_min_duration_statement = 1000
